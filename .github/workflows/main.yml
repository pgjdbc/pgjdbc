name: CI

on:
  push:
    branches:
      - '*'
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      matrix_rng_seed:
        description: RNG Seed
        required: false

permissions:
  contents: read

# https://help.github.com/en/actions/automating-your-workflow-with-github-actions/software-installed-on-github-hosted-runners
# GitHub Actions does not support Docker on Windows/macOS, so we use ikalnytskyi/action-setup-postgres there

concurrency:
  # On master/release, we don't want any jobs cancelled so the sha is used to name the group
  # On PR branches, we cancel the job if new commits are pushed
  # More info: https://stackoverflow.com/a/68422069/253468
  group: ${{ (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' ) && format('ci-main-{0}', github.sha) || format('ci-main-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  code-style:
    name: Code style
    runs-on: ubuntu-latest
    env:
      ACTIONS_STEP_DEBUG: true
      ACTIONS_RUNNER_DEBUG: true
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        fetch-depth: 50
    - name: 'Set up JDK 21'
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        distribution: zulu
        java-version: 21
    - uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3.0.1
      name: Verify code style
      env:
        S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
        S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
      with:
        job-id: jdk21
        arguments: styleCheck jandex -PenableErrorprone classes

  linux-checkerframework:
    name: 'CheckerFramework'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 50
      - name: 'Set up JDK 21'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: zulu
          java-version: 21
      - uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3.0.1
        name: Run CheckerFramework
        env:
          S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
          S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
        with:
          read-only: false
          job-id: checker-jdk21
          arguments: --scan --no-parallel --no-daemon -PenableCheckerframework classes :postgresql:compileJava11

  source-distribution-check:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 50
      - name: Start PostgreSQL
        working-directory: docker/postgres-server
        run: docker compose up -d && docker compose logs
      - name: 'Set up JDK 21'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: zulu
          java-version: 21
      - uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3.0.1
        name: Prepare source distribution
        env:
          S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
          S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
        with:
          job-id: source-release-jdk21
          arguments: --scan --no-parallel --no-daemon sourceDistribution -Ppgjdbc.version=1.0 -Prelease -Psigning.pgp.enabled=OFF
      - name: Verify source distribution
        working-directory: pgjdbc/build/distributions
        shell: bash
        # language=bash
        run: |
          tar xzf postgresql-1.0-jdbc-src.tar.gz
          cd postgresql-1.0-jdbc-src
          mvn --batch-mode --fail-at-end --show-version verify
      - name: Attach heap dump if any
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pgjdbc-heapdump-source-distribution
          path: pgjdbc/build/distributions/postgresql-1.0-jdbc-src/target/surefire-reports/*.hprof

  matrix_prep:
    name: Matrix Preparation
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    env:
      MATRIX_JOBS: 5
      GITHUB_PR_NUMBER: ${{ github.event.number }}
      RNG_SEED: ${{ github.event.inputs.matrix_rng_seed }}
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        fetch-depth: 50
    - id: set-matrix
      shell: bash
      # language=bash
      run: |
        node .github/workflows/matrix.mjs

  build-test:
    name: '${{ matrix.name }}'
    runs-on: ${{ matrix.os }}
    needs: matrix_prep
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.matrix_prep.outputs.matrix)}}
    env:
      ACTIONS_STEP_DEBUG: true
      ACTIONS_RUNNER_DEBUG: true
      TZ: ${{ matrix.tz }}
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        fetch-depth: 50
    - name: Start PostgreSQL PGV=${{ matrix.pg_version }} TZ=${{ matrix.server_tz }} XA=${{ matrix.xa }} SSL=${{ matrix.ssl }} SCRAM=${{ matrix.scram }} CREATE_REPLICAS=${{ matrix.replication }}
      if: ${{ runner.os == 'Linux' }}
      working-directory: docker/postgres-server
      env:
        PGV: ${{ matrix.pg_version }}
        TZ: ${{ matrix.server_tz }}
        XA: ${{ matrix.xa }}
        SSL: ${{ matrix.ssl }}
        SCRAM: ${{ matrix.scram }}
        CREATE_REPLICAS: ${{ matrix.replication }}
      # The below run command is long, however, it is intentional, and it makes the output nicer in GitHub UI
      # language=bash
      run: |
        echo 'Starting PostgreSQL via docker compose down; PGV=${{ matrix.pg_version }} TZ=${{ matrix.server_tz }} XA=${{ matrix.xa }} SSL=${{ matrix.ssl }} SCRAM=${{ matrix.scram }} CREATE_REPLICAS=${{ matrix.replication }} docker compose up'

        docker compose down -v --rmi local || true
        sed -i -r '/- (543[3-4]):\1/d' docker-compose.yml
        docker compose up -d
        docker compose logs
    - name: Start PostgreSQL PGV=${{ matrix.pg_version }}
      if: ${{ runner.os != 'Linux' }}
      uses: ikalnytskyi/action-setup-postgres@c4dda34aae1c821e3a771b68b73b13af3198a7ee # v8
      with:
        username: postgres
        password: postgres
        database: postgres
        postgres-version: ${{ matrix.pg_version }}
      id: postgres
    - name: Configure PostgreSQL SSL=${{ matrix.ssl }} REPLICATION=${{ matrix.replication }}
      if: ${{ runner.os != 'Linux' }}
      shell: bash
      # language=bash
      run: |
        PGDATA="$RUNNER_TEMP/pgdata"
        PG_HBA="$PGDATA/pg_hba.conf"

        # Use the same pg_hba.conf as the Docker-based setup.
        # Remove 'local' lines (no unix sockets on Windows) and
        # add scram entry for PG 10+ auth tests.
        cp certdir/server/pg_hba.conf "$PG_HBA"
        sed '/^local/d' "$PG_HBA" > "$PG_HBA.tmp"
        mv "$PG_HBA.tmp" "$PG_HBA"
        echo "host    authtest        scram           all            scram-sha-256" >> "$PG_HBA"

        if [ "$SSL" = "yes" ]; then
          # Copy SSL certificates from the repo into PGDATA
          cp certdir/server/server.crt "$PGDATA/"
          cp certdir/server/server.key "$PGDATA/"
          cp certdir/server/root.crt "$PGDATA/"
          chmod 600 "$PGDATA/server.key"
          psql -c "ALTER SYSTEM SET ssl = 'on'"
          psql -c "ALTER SYSTEM SET ssl_cert_file = 'server.crt'"
          psql -c "ALTER SYSTEM SET ssl_key_file = 'server.key'"
          psql -c "ALTER SYSTEM SET ssl_ca_file = 'root.crt'"
        else
          # Comment out hostssl lines when SSL is disabled, same as Docker entrypoint
          sed 's/^hostssl/#hostssl/' "$PG_HBA" > "$PG_HBA.tmp"
          mv "$PG_HBA.tmp" "$PG_HBA"
        fi

        if [ "$REPLICATION" = "yes" ]; then
          psql -c "ALTER SYSTEM SET wal_level = 'logical'"
        fi

        psql -c "ALTER SYSTEM SET password_encryption = 'md5'"
        # Performance tuning to match the Docker-based setup
        psql -c "ALTER SYSTEM SET fsync = 'off'"
        psql -c "ALTER SYSTEM SET synchronous_commit = 'off'"
        psql -c "ALTER SYSTEM SET full_page_writes = 'off'"
        # Logging
        psql -c "ALTER SYSTEM SET logging_collector = 'on'"
        psql -c "ALTER SYSTEM SET log_directory = 'log'"
        psql -c "ALTER SYSTEM SET log_connections = 'on'"
        psql -c "ALTER SYSTEM SET log_disconnections = 'on'"
        pg_ctl restart -D "$PGDATA" -w

        # Create test user and databases
        psql -c "CREATE USER test WITH PASSWORD 'test'"
        psql -c "CREATE DATABASE test OWNER test"
        psql -c "CREATE DATABASE test_2 OWNER test"
        if [ "$SSL" = "yes" ]; then
          for db in hostdb hostssldb hostnossldb certdb hostsslcertdb; do
            psql -c "CREATE DATABASE $db OWNER test"
            psql -c "CREATE EXTENSION sslinfo" -d "$db"
          done
        fi
        psql -c "CREATE EXTENSION hstore" -d test
        psql -c "CREATE EXTENSION sslinfo" -d test
      env:
        PGSERVICE: ${{ steps.postgres.outputs.service-name }}
        SSL: ${{ matrix.ssl }}
        REPLICATION: ${{ matrix.replication }}
    - name: Set up Java 21 and ${{ matrix.non_ea_java_version }}, ${{ matrix.java_distribution }}, ${{ runner.arch }}
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        # The latest one will be the default, so we use Java 21 for launching Gradle
        # oracle-actions/setup-java below requires Java 21, so we must install Java 21 before calling oracle-actions/setup-java
        java-version: |
          ${{ matrix.non_ea_java_version }}
          21
        distribution: ${{ matrix.java_distribution }}
        # Architecture is explicit to workaround https://github.com/actions/setup-java/issues/559
        architecture: ${{ runner.arch == 'ARM64' && 'aarch64' || 'x64' }}
    - name: Set up Java ${{ matrix.java_version }}, oracle
      id: setup_ea_java
      if: ${{ matrix.oracle_java_website != '' }}
      uses: oracle-actions/setup-java@fff43251af9936a0e6a4d5d0946e14f1680e9b6b # v1.5.0
      env:
        # Java 21 is needed for executing oracle-actions/setup-java, so we pass it here
        JAVA_HOME_21_X64: ${{ env.JAVA_HOME_21_AARCH64 || env.JAVA_HOME_21_X64 }}
      with:
        website: ${{ matrix.oracle_java_website }}
        release: ${{ matrix.java_version }}
    - name: Set up Java 21 ${{ matrix.java_distribution }} as default
      # oracle-actions/setup-java above installs EA java by default, so we need to reinstall Java 21 as the default
      if: ${{ matrix.oracle_java_website != '' }}
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        java-version: 21
        distribution: ${{ matrix.java_distribution }}
        # Architecture is explicit to workaround https://github.com/actions/setup-java/issues/559
        architecture: ${{ runner.arch == 'ARM64' && 'aarch64' || 'x64' }}
    - name: Prepare local properties
      shell: bash
      # language=bash
      run: |
        # See https://github.com/actions/runner/issues/409
        cat <<EOF >ssltest.local.properties
        enable_ssl_tests=${{ matrix.ssl == 'yes' && 'true' || 'false' }}
        EOF
        cat <<EOF >build.local.properties
        preferQueryMode=${{ matrix.query_mode }}
        EOF
        if [ "$RUNNER_OS" != "Linux" ]; then
          cat <<EOF >>build.local.properties
        privilegedUser=postgres
        privilegedPassword=postgres
        EOF
        fi

    - uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3.0.1
      name: Test
      env:
        S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
        S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
        _JAVA_OPTIONS: ${{ matrix.extraJvmArgs }}
      with:
        read-only: false
        job-id: jdk${{ matrix.java_version }}
        arguments: --scan --no-parallel --no-daemon jandex test ${{ matrix.extraGradleArgs }}
        properties: |
          includeTestTags=${{ matrix.includeTestTags }}
          testExtraJvmArgs=${{ matrix.testExtraJvmArgs }}
          jdkBuildVersion=21
          jdkTestVersion=${{ matrix.java_version == 'EA' && steps.setup_ea_java.outputs.version || matrix.java_version }}
          jdkTestVendor=${{ matrix.java_vendor }}
          # We provision JDKs with GitHub Actions for caching purposes, so Gradle should rather fail in case JDK is not found
          org.gradle.java.installations.auto-download=false

    - name: 'Install krb5 for GSS tests'
      if: ${{ matrix.gss == 'yes' }}
      # language=bash
      run: |
        sudo apt -y update
        sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
        sudo apt -y install postgresql-16
        sudo apt -y install krb5-kdc krb5-admin-server libkrb5-dev postgresql
    - name: 'Update hosts for GSS tests'
      if: ${{ matrix.gss == 'yes' }}
      # language=bash
      run: |
        sudo -- sh -c "echo 127.0.0.1 auth-test-localhost.postgresql.example.com localhost > /etc/hosts"
        cat /etc/hosts
    - uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3.0.1
      if: ${{ matrix.deploy_to_maven_local }}
      name: Deploy pgjdbc to mavenLocal
      with:
        read-only: false
        job-id: jdk${{ matrix.java_version }}
        arguments: publishToMavenLocal -Ppgjdbc.version=1.0.0-dev-master -PskipJavadoc
    - name: Attach heap dump if any
      if: ${{ failure() && github.event_name == 'pull_request' }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: pgjdbc-heapdump
        path: pgjdbc/*.hprof
    - name: Collect PostgreSQL server logs (Linux)
      if: ${{ failure() && runner.os == 'Linux' }}
      shell: bash
      # language=bash
      run: |
        docker compose -f docker/postgres-server/docker-compose.yml logs --no-color > "$RUNNER_TEMP/pg-server-logs.txt" 2>&1 || true
    - name: Collect PostgreSQL server logs (Windows)
      if: ${{ failure() && runner.os != 'Linux' }}
      shell: bash
      # language=bash
      run: |
        PG_DATADIR="$RUNNER_TEMP/pgdata"
        LOG_FILE="$RUNNER_TEMP/pg-server-logs.txt"
        echo "=== pg_hba.conf ===" > "$LOG_FILE"
        cat "$PG_DATADIR/pg_hba.conf" >> "$LOG_FILE" 2>/dev/null || true
        echo "" >> "$LOG_FILE"
        echo "=== postgresql.conf (non-default) ===" >> "$LOG_FILE"
        grep -v '^#' "$PG_DATADIR/postgresql.conf" 2>/dev/null | grep -v '^$' >> "$LOG_FILE" || true
        echo "" >> "$LOG_FILE"
        echo "=== postgresql.auto.conf ===" >> "$LOG_FILE"
        cat "$PG_DATADIR/postgresql.auto.conf" >> "$LOG_FILE" 2>/dev/null || true
        echo "" >> "$LOG_FILE"
        echo "=== PostgreSQL logs ===" >> "$LOG_FILE"
        if [ -d "$PG_DATADIR/log" ]; then
          cat "$PG_DATADIR/log"/* >> "$LOG_FILE" 2>/dev/null || true
        else
          echo "No log directory at $PG_DATADIR/log" >> "$LOG_FILE"
          ls -la "$PG_DATADIR/" >> "$LOG_FILE" 2>/dev/null || true
        fi
    - name: Sanitize artifact name
      if: ${{ failure() }}
      id: artifact_name
      shell: bash
      # language=bash
      run: |
        name="pg-server-logs-${{ matrix.name }}"
        # Remove characters illegal in GitHub artifact names: " : < > | * ? \r \n \ /
        name="${name//[\":<>|*?\\\/]/}"
        # Shorten to 50 characters and add run id for uniqueness
        if [ ${#name} -gt 50 ]; then
          suffix="-${{ github.run_id }}"
          name="${name:0:$((50 - ${#suffix}))}${suffix}"
        fi
        echo "name=$name" >> "$GITHUB_OUTPUT"
    - name: Upload PostgreSQL server logs
      if: ${{ failure() }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ steps.artifact_name.outputs.name }}
        path: ${{ runner.temp }}/pg-server-logs.txt
    - name: Test GSS
      if: ${{ matrix.gss == 'yes' }}
      # language=bash
      run: |
        cd test-gss
        ./gradlew assemble
        ./gradlew run
      env:
        KRB5CCNAME: /home/runner/work/pgjdbc/pgjdbc/test-gss/tmp_check/krb5cc
        KRB5_CONFIG: /home/runner/work/pgjdbc/pgjdbc/test-gss/tmp_check/krb5.conf
        KRB5_KDC_PROFILE: /home/runner/work/pgjdbc/pgjdbc/test-gss/tmp_check/kdc.conf
    - name: Test anorm-sbt
      if: ${{ matrix.check_anorm_sbt == 'yes' }}
      # language=bash
      run: |
        # mkdir -p $HOME/.sbt/launchers/0.13.12
        # curl -L -o $HOME/.sbt/launchers/0.13.12/sbt-launch.jar http://dl.bintray.com/typesafe/ivy-releases/org.scala-sbt/sbt-launch/0.13.12/sbt-launch.jar

        cd test-anorm-sbt
        sbt test

    - name: Cleanup Docker
      if: ${{ always() && runner.os == 'Linux' }}
      working-directory: docker/postgres-server
      # language=bash
      run: |
        docker compose ps
        docker compose down -v --rmi local
