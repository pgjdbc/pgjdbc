name: CI

on:
  push:
    branches:
      - '*'
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'appveyor.xml'
      - '.travis.yml'
      - '.travis/**'
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'appveyor.xml'
      - '.travis.yml'
      - '.travis/**'

# https://help.github.com/en/actions/automating-your-workflow-with-github-actions/software-installed-on-github-hosted-runners
# GitHub Actions does not support Docker, PostgreSQL server on Windows, macOS :(

concurrency:
  # On master/release, we don't want any jobs cancelled so the sha is used to name the group
  # On PR branches, we cancel the job if new commits are pushed
  # More info: https://stackoverflow.com/a/68422069/253468
  group: ${{ (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' ) && format('ci-main-{0}', github.sha) || format('ci-main-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  code-style:
    name: 'Code style'
    runs-on: ubuntu-latest
    env:
      ACTIONS_STEP_DEBUG: true
      ACTIONS_RUNNER_DEBUG: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 50
    - name: 'Set up JDK 17'
      uses: actions/setup-java@v3
      with:
        distribution: zulu
        java-version: 17
    - uses: burrunan/gradle-cache-action@v1
      name: Verify code style
      env:
        S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
        S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
      with:
        job-id: jdk8
        arguments: autostyleCheck checkstyleAll jandex

  linux-checkerframework:
    name: 'CheckerFramework'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      # CheckerFramework 3.5.0 cannot access javac internals on JDK 16+, so run it on JDK 11.
      - name: 'Set up JDK 11'
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 11
      - uses: burrunan/gradle-cache-action@v1
        name: Run CheckerFramework
        env:
          S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
          S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
        with:
          read-only: ${{ matrix.os == 'self-hosted' }}
          job-id: checker-jdk11
          arguments: --scan --no-parallel --no-daemon -PenableCheckerframework classes -PjdkBuildVersion=11 -PignoreJdkCheck

  source-distribution-check:
    name: 'Source distribution (JDK 17)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - name: Start PostgreSQL
        working-directory: docker/postgres-server
        run: docker compose up -d && docker compose logs
      - name: 'Set up JDK 17'
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 17
      - uses: burrunan/gradle-cache-action@v1
        name: Prepare source distribution
        env:
          S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
          S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
        with:
          job-id: source-release-jdk17
          arguments: --scan --no-parallel --no-daemon sourceDistribution -Ppgjdbc.version=1.0 -Prelease
      - name: Verify source distribution
        working-directory: pgjdbc/build/distributions
        run: |
          tar xzf postgresql-1.0-jdbc-src.tar.gz
          cd postgresql-1.0-jdbc-src
          mvn --batch-mode --fail-at-end --show-version verify

  matrix_prep:
    name: Matrix Preparation
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - id: set-matrix
      run: |
        node -p "
          '::set-output name=matrix::' + JSON.stringify({
            testJdkVersion: [
              8,
              11,
            ],
            os: [
              'ubuntu-latest',
            ],
          })"

  build-test:
    name: 'Test - build JDK 17, test JDK ${{ matrix.testJdkVersion }} on ${{ matrix.os }}'
    runs-on: ${{ matrix.os }}
    needs: matrix_prep
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.matrix_prep.outputs.matrix)}}
    env:
      ACTIONS_STEP_DEBUG: true
      ACTIONS_RUNNER_DEBUG: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 50
    - name: Start PostgreSQL
      working-directory: docker/postgres-server
      run: |
        docker compose down -v --rmi local || true
        sed -i -r '/- (543[3-4]):\1/d' docker-compose.yml
        docker compose up -d
        docker compose logs
    - name: 'Get test node ARCH'
      run: echo "::set-output name=arch_name::$(uname -i)"
      id: get_arch_name
    - name: 'Set up test JDK ${{ matrix.testJdkVersion }} and build JDK 17'
      if: ${{ steps.get_arch_name.outputs.arch_name != 'aarch64' }}
      uses: actions/setup-java@v3
      with:
        distribution: zulu
        # The last version becomes the default JAVA_HOME, so Gradle (and the build) runs on JDK 17.
        # The test task is launched on JDK ${{ matrix.testJdkVersion }} via the Gradle toolchain.
        java-version: |
          ${{ matrix.testJdkVersion }}
          17
        architecture: x64
    - name: 'Setup test JDK ${{ matrix.testJdkVersion }} and build JDK 17 on ARM64'
      if: ${{ steps.get_arch_name.outputs.arch_name == 'aarch64' }}
      uses: AdoptOpenJDK/install-jdk@v1
      with:
        impl: hotspot # or openj9
        version: ${{ matrix.testJdkVersion }}
        architecture: aarch64
    - name: Prepare ssltest.local.properties
      run: echo enable_ssl_tests=true > ssltest.local.properties
    - uses: burrunan/gradle-cache-action@v1
      name: Test
      env:
        S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
        S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
      with:
        read-only: ${{ matrix.os == 'self-hosted' }}
        job-id: jdk${{ matrix.testJdkVersion }}
        arguments: --scan --no-parallel --no-daemon jandex test
        properties: |
          includeTestTags=!org.postgresql.test.SlowTests & !org.postgresql.test.Replication
          jdkBuildVersion=17
          jdkTestVersion=${{ matrix.testJdkVersion }}
          org.gradle.java.installations.fromEnv=JAVA_HOME_${{ matrix.testJdkVersion }}_X64,JAVA_HOME_17_X64
          org.gradle.java.installations.auto-download=false
    - name: Cleanup Docker
      if: ${{ always() }}
      working-directory: docker/postgres-server
      run: |
        docker compose ps
        docker compose down -v --rmi local

  gss-encryption:
    # The driver is built on JDK 17, so this job no longer varies by the test JDK matrix.
    name: 'GSS Test - JDK 17 on ubuntu-latest'
    runs-on: ubuntu-latest
    env:
      ACTIONS_STEP_DEBUG: true
      ACTIONS_RUNNER_DEBUG: true
    steps:
    - uses: actions/checkout@v4
    - name: 'Get test node ARCH'
      run: echo "::set-output name=arch_name::$(uname -i)"
      id: get_arch_name
    - name: 'Set up JDK 17'
      if: ${{ steps.get_arch_name.outputs.arch_name != 'aarch64' }}
      uses: actions/setup-java@v3
      with:
        distribution: zulu
        java-version: 17
    - name: 'Setup JDK 17 on ARM64'
      if: ${{ steps.get_arch_name.outputs.arch_name == 'aarch64' }}
      uses: AdoptOpenJDK/install-jdk@v1
      with:
        impl: hotspot # or openj9
        version: '17'
        architecture: aarch64
    - name: 'Install software'
      if: ${{ steps.get_arch_name.outputs.arch_name != 'aarch64' }}
      run: |
        sudo apt -y update
        sudo apt -y install krb5-kdc krb5-admin-server libkrb5-dev postgresql
    - name: 'Update hosts'
      run: |
        sudo -- sh -c "echo 127.0.0.1 localhost auth-test-localhost.postgresql.example.com > /etc/hosts"
        cat /etc/hosts
    - uses: burrunan/gradle-cache-action@v1
      name: Build pgjdbc
      with:
        read-only: false
        job-id: gss-jdk17
        arguments: publishToMavenLocal -Ppgjdbc.version=1.0.0-dev-master -PskipJavadoc
    - name: Run tests
      run: |
        cd test-gss
        ./gradlew assemble
        ./gradlew run
      env:
        KRB5CCNAME: /home/runner/work/pgjdbc/pgjdbc/test-gss/tmp_check/krb5cc
        KRB5_CONFIG: /home/runner/work/pgjdbc/pgjdbc/test-gss/tmp_check/krb5.conf
        KRB5_KDC_PROFILE: /home/runner/work/pgjdbc/pgjdbc/test-gss/tmp_check/kdc.conf
