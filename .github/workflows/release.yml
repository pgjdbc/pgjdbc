name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        required: false
        type: string
        default: ''
        description: Release version number (without v, defaults to gradle.properties)

jobs:
  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    permissions:
      # write permission is required to create a GitHub release
      contents: write
      # write permission is required for autolabeler
      # otherwise, read permission is required at least
      pull-requests: read
    steps:
      - name: Validate input parameters
        env:
          INPUT_VERSION: ${{ inputs.version }}
        # language=bash
        run: |
          # Ensure we release from master or release/** branches, ensure version number follows semver
          BRANCH_NAME=${GITHUB_REF##refs/heads/}
          if [[ ! "$BRANCH_NAME" =~ ^(master|release/.+)$ ]]; then
            echo "Error: Release must be created from 'master' or 'release/**' branch. Current branch is '$BRANCH_NAME'"
            exit 1
          fi

          # Validate version follows semver or is empty
          VERSION="$INPUT_VERSION"
          if [[ -n "$VERSION" && ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be blank or follow semantic versioning format (x.y.z). Got '$VERSION'"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get the release version
        id: release_version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        # language=bash
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
            echo "Got release version from workflow input: $VERSION"
          else
            VERSION=$(grep "^pgjdbc.version=" gradle.properties | cut -d'=' -f2)
            echo "Got release version from gradle.properties: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
        with:
          # language=javascript
          script: |
             const tag = `REL${process.env.VERSION}`;
             // Check if the tag exists
             const { data: tags } = await github.rest.git.listMatchingRefs({
                 owner: context.repo.owner,
                 repo: context.repo.repo,
                 ref: `tags/${tag}`
             });
             if (tags.length > 0) {
                 core.setFailed(`Tag ${tag} already exists. Bump version in gradle.properties and try releasing again.`);
             }

      - name: Prepare git name and email
        # language=bash
        run: |
          # Configure git user.name and user.email
          # See https://github.com/actions/checkout?tab=readme-ov-file#push-a-commit-using-the-built-in-token
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app_token
        with:
          app-id: ${{ vars.GH_BUMP_VERSION_APP_ID }}
          private-key: ${{ secrets.GH_BUMP_VERSION_APP_KEY }}

      - name: Update version in gradle.properties to ${{ steps.release_version.outputs.version }}
        uses: ./.github/actions/update_version
        with:
          token: ${{ steps.app_token.outputs.token }}
          version: ${{ steps.release_version.outputs.version }}

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: zulu
          java-version: 21
          server-id: central

      # Publish to Central before generating a tag, so we don't need to drop the tag if
      # Central deployment fails.
      # publishAllPublicationsToTmp-mavenRepository stages the signed artifacts under
      # pgjdbc/build/local-maven-repo in the same Gradle run, so the jar and signature attached to
      # the GitHub release below are byte-for-byte the ones uploaded to Central.
      - name: Publish to Central Portal
        uses: burrunan/gradle-cache-action@4b67497abd37a511d6c1dc6299bdd84ff39f7bf5 # v3.0.2
        with:
          arguments: publishAggregationToCentralPortal :postgresql:publishAllPublicationsToTmp-mavenRepository
          # language=properties
          properties: |
            release=true
            centralPortalPublishingType=AUTOMATIC
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          SIGNING_PGP_PRIVATE_KEY: ${{ secrets.RELEASE_PGP_PRIVATE_KEY }}
          SIGNING_PGP_PASSPHRASE: ${{ secrets.RELEASE_PGP_PASSPHRASE }}

      - name: Publish GitHub release
        uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
        id: publish_release
        with:
          disable-autolabeler: true
          publish: true
          latest: ${{ github.ref_name == github.event.repository.default_branch }}
          version: ${{ steps.release_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Must run after "Publish GitHub release" (the release has to exist) and before the version
      # bump below, whose push triggers release-drafter for the next version's draft.
      - name: Attach files to the release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          # https://github.com/release-drafter/release-drafter#action-outputs
          RELEASE_ID: ${{ steps.publish_release.outputs.id }}
          VERSION: ${{ steps.release_version.outputs.version }}
        with:
          # language=JavaScript
          script: |
            const fs = require('fs');
            const {RELEASE_ID, VERSION} = process.env;
            // The jar and its detached PGP signature staged by the publish step. Paths are fixed,
            // so a missing file means the publish step failed to produce it.
            const artifactDir = `pgjdbc/build/local-maven-repo/org/postgresql/postgresql/${VERSION}`;
            const artifactName = `postgresql-${VERSION}.jar`;
            const uploadFiles = [
                [artifactName, `${artifactDir}/${artifactName}`],
                [`${artifactName}.asc`, `${artifactDir}/${artifactName}.asc`],
            ];
            for (const [name, filePath] of uploadFiles) {
                if (!fs.existsSync(filePath)) {
                    core.setFailed(`Release artifact ${name} not found at ${filePath}. Check that the publish step ran publishAllPublicationsToTmp-mavenRepository.`);
                    return;
                }
            }
            // Drop any stale jar/signature assets (e.g. a SNAPSHOT jar carried over on an older
            // draft) before re-uploading. This assumes the release ships exactly uploadFiles; widen
            // the filter if more jars are ever attached.
            const assets = await github.rest.repos.listReleaseAssets({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: RELEASE_ID
            });
            for (const asset of assets.data) {
                if (asset.name.endsWith('.jar') || asset.name.endsWith('.jar.asc')) {
                    core.info(`Deleting stale release asset ${asset.name}`);
                    await github.rest.repos.deleteReleaseAsset({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        asset_id: asset.id
                    });
                }
            }
            for (const [name, filePath] of uploadFiles) {
                core.info(`Uploading ${name} from ${filePath}`);
                await github.rest.repos.uploadReleaseAsset({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    release_id: RELEASE_ID,
                    data: fs.readFileSync(filePath)
                });
            }

      - name: Compute the next patch version
        id: next_version
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
        # language=bash
        run: |
          # Compute the next patch version
          IFS='.' read -r major minor patch <<< "$RELEASE_VERSION"
          next_version="${major}.${minor}.$((patch + 1))"
          echo "Next version: $next_version"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"

      - name: Update version in gradle.properties to ${{ steps.next_version.outputs.version }}
        uses: ./.github/actions/update_version
        with:
          token: ${{ steps.app_token.outputs.token }}
          version: ${{ steps.next_version.outputs.version }}
