# Hand-maintained companion to docs/data/release-history.yaml (generated
# by :docs-tools:generateReleaseHistory from refs in the local clone).
#
# Carries only the facts that cannot be derived from git itself:
#   - the proactive-security window length (in years);
#   - minimum Java runtime (sparse breakpoints by pgjdbc version);
#   - minimum PostgreSQL server (sparse breakpoints by pgjdbc version);
#   - the .jre6 / .jre7 classifier variants of the 42.2.x line;
#   - the CI matrix as of the latest release of each line;
#   - per-branch notes for exceptional caveats (e.g. 42.2.x backports).
#
# CVE-bearing releases are NOT listed here; the generator reads each
# changelog's `cve:` frontmatter field directly. Authoring a new
# security release does not require touching this file.

# Drives the Status column. For each release line we compute
#   support_end = first_release_date + support_window_years
# and label the row "Security until YYYY-MM" while today < support_end,
# "EOL since YYYY-MM" once support_end has passed. Matches the project
# policy of proactive security backports for branches younger than five
# years (see SECURITY.md for the wording).
support_window_years: 5
#
# Sparse-breakpoint resolver semantics (applies to `min_java` and
# `min_postgresql`): for a given pgjdbc version, the chosen row is the
# entry with the LARGEST `pgjdbc` value still ≤ the given version. Add
# a new row only when the supported minimum actually changes. A branch
# whose latest tag is older than the lowest breakpoint here is NOT
# rendered in the matrix at all — the lowest breakpoint is the de facto
# floor of the table.

min_java:
  - pgjdbc: "42.2.0"
    java:   8

min_postgresql:
  - pgjdbc: "42.2.0"
    postgresql: "8.4"
  - pgjdbc: "42.7.5"
    postgresql: "9.1"

# Classifier-variant builds of the 42.2.x line. These ship as separate
# Maven artefacts with a `.jre6` / `.jre7` suffix and stopped earlier
# than the unclassified Java 8 build. Rendered as additional rows under
# the same `42.2.x` release line, distinguished by the version cell.
classifiers:
  - id: jre6
    branch: "42.2.x"
    last_version: "42.2.27"
    min_java: 6
  - id: jre7
    branch: "42.2.x"
    last_version: "42.2.29"
    min_java: 7

# CI matrix as currently configured on the line's HEAD (or its latest
# release for already-frozen lines). Reflects what the project tests
# against — older Java / PostgreSQL versions may still load the JAR
# but are not part of regression coverage.
#
# Currently only the active 42.7.x line is populated. Other lines will
# be filled in as their matrices are audited (or auto-extracted from
# .github/workflows/matrix.mjs at each branch head — future work).
tested_java:
  "42.7.x": ["8", "11", "17", "21", "25", "EA"]

tested_postgresql:
  "42.7.x":
    - "9.1"
    - "9.2"
    - "9.3"
    - "9.4"
    - "9.5"
    - "9.6"
    - "10"
    - "11"
    - "12"
    - "13"
    - "14"
    - "15"
    - "16"
    - "17"

# Per-branch one-liner shown in the Notes column when no other note
# applies. Reserve this slot for caveats that the Java / PostgreSQL
# / Status columns cannot already express — e.g. an explicit
# SECURITY.md exception that contradicts the computed EOL year.
# Currently empty: the previous 42.2.x note duplicated information
# already visible in the .jre6 / .jre7 classifier rows.
branch_notes: {}
