# Stub for the connection-properties reference table.
#
# This file is a temporary hand-written placeholder. In Phase 0.5 it is
# replaced by output of `:docs:generateProperties`, which introspects
# PGProperty + @PgApi/@PgTags/@PgPropertyType annotations.
#
# Schema mirrors what the Gradle task will emit; keys are stable so the
# param-table shortcode does not need to change.

- name:         adaptiveFetch
  type:         BOOLEAN
  default:      "false"
  introducedIn: "42.2.11"
  status:       STABLE
  tags:         [fetch, network]
  description: >-
    Dynamically tunes the per-request row count to fill `maxResultBuffer`.
    Requires `defaultRowFetchSize` and `maxResultBuffer` to be set.

- name:         sslmode
  type:         ENUM
  default:      prefer
  introducedIn: "9.4-1200"
  status:       STABLE
  tags:         [ssl]
  description: >-
    Controls SSL/TLS verification: `disable`, `allow`, `prefer`, `require`,
    `verify-ca`, `verify-full`. See [Using SSL](/documentation/ssl/).

- name:         channelBinding
  type:         ENUM
  default:      prefer
  introducedIn: "42.7.0"
  status:       STABLE
  tags:         [ssl, authentication]
  description: >-
    Requires the SCRAM client to bind to the TLS channel. Values: `require`,
    `prefer`, `disable`.

- name:         sslfactoryarg
  type:         STRING
  default:      ""
  introducedIn: "9.4"
  status:       DEPRECATED
  deprecatedIn: "42.6.0"
  tags:         [ssl]
  description: >-
    Optional constructor argument for `sslfactory`. Deprecated; configure the
    factory class directly.

# Stub illustrating the full lifecycle (introduced → deprecated → hidden).
# Real PGProperty entries in this state appear with all three version badges.
- name:         legacyAuthMode
  type:         ENUM
  default:      "off"
  introducedIn: "9.4"
  status:       HIDDEN
  deprecatedIn: "42.5.0"
  hiddenIn:     "42.8.0"
  tags:         [authentication]
  description: >-
    Removed legacy authentication mode. Source-level references emit a
    compiler error; existing compiled code keeps working. Use
    `requireAuth` instead.

- name:         scramMaxIterations
  type:         INT
  default:      "100000"
  introducedIn: "42.7.11"
  status:       STABLE
  tags:         [authentication]
  description: >-
    Maximum PBKDF2 iteration count accepted from the server during
    SCRAM-SHA-256 authentication. Caps client CPU exposure to a hostile or
    compromised server. Set to `0` to disable the check.

- name:         connectTimeout
  type:         DURATION_SECONDS
  default:      "10"
  introducedIn: "9.4"
  status:       STABLE
  tags:         [timeout, network]
  description: >-
    Socket connect timeout. If establishing the TCP connection takes longer
    than this, the attempt fails. `0` disables the timeout.

- name:         socketTimeout
  type:         DURATION_SECONDS
  default:      "0"
  introducedIn: "9.4"
  status:       STABLE
  tags:         [timeout, network]
  description: >-
    Socket read timeout. If a single read takes longer than this, the
    connection is closed. Doubles as a brute-force per-query timeout and a
    way to detect dead networks. `0` disables.

- name:         maxSendBufferSize
  type:         SIZE_BYTES
  default:      "8192"
  introducedIn: "42.7.4"
  status:       STABLE
  tags:         [network]
  description: >-
    Maximum bytes buffered before flushing to the backend. The driver uses
    `min(maxSendBufferSize, max(8192, SO_SNDBUF))` to pick the actual
    buffer size.
