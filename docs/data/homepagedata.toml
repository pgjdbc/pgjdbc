# Common tasks. Each card on the homepage grid links to the relevant
# topical page in the documentation. Phrasing is "as a Java developer
# I want to …" — task-driven, not section-mirror; the homepage does
# not duplicate the sidebar.
#
# Card descriptions are deliberately short — one short line,
# ideally never more than two. The page below the homepage gives
# the depth; the homepage gives scanability.

[[task]]
title = "Connection properties"
desc  = "Every tunable the driver exposes — defaults, types, versions."
url   = "documentation/reference/connection-properties/"

[[task]]
title = "Recommended properties"
desc  = "Non-default settings worth turning on in production."
url   = "documentation/connect/recommended-properties/"

[[task]]
title = "Open a connection"
desc  = "Install pgJDBC and connect to PostgreSQL."
url   = "documentation/getting-started/install/"

[[task]]
title = "Configure SSL / TLS"
desc  = "Choose sslmode, set up trust, and enable channel binding."
url   = "documentation/security/ssl-tls/"

[[task]]
title = "Pool connections"
desc  = "HikariCP, Tomcat JDBC, c3p0, and related tuning."
url   = "documentation/connect/datasource/"

[[task]]
title = "Diagnose errors"
desc  = "Troubleshooting pages keyed by error message and symptom."
url   = "documentation/troubleshooting/"

# "Pick a version" removed from the grid: Compatibility already lives
# in the hero __links list, so a homepage card was a duplicate. The
# new "Recommended properties" card takes its slot — the grid is still
# 3 × 2 / 2 × 3 / 1.

# Homepage release data is no longer mirrored here. The release
# card (`partials/home/release.html`) and the "Recent:" line both
# read directly from /changelogs/*-release.md — version, date,
# summary, URL are all there. To surface a new release on the
# homepage, just author its changelog file; the homepage rebuilds
# pick it up automatically.
